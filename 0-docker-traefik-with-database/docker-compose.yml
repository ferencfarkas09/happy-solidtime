services:
  init-permissions:
    image: alpine:latest
    restart: "no"
    volumes:
      - "app-storage:/var/www/html/storage"
    command: sh -c "mkdir -p /var/www/html/storage/logs /var/www/html/storage/app && chown -R 1000:1000 /var/www/html/storage && chmod -R ug+rwX /var/www/html/storage"
    networks:
      - internal
  app:
    restart: always
    image: "solidtime/solidtime:${SOLIDTIME_IMAGE_TAG:-latest}"
    user: "1000:1000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${REVERSE_PROXY_NETWORK}"
      - "traefik.http.services.solidtime.loadbalancer.server.port=8000"
      # http
      - "traefik.http.routers.solidtime.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.solidtime.entrypoints=web"
      - "traefik.http.routers.solidtime.middlewares=redirect-to-https@file"
      # https
      - "traefik.http.routers.solidtime-https.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.solidtime-https.entrypoints=websecure"
      - "traefik.http.routers.solidtime-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.solidtime-https.tls=true"
    networks:
      - frontend
      - internal
    volumes:
      - "app-storage:/var/www/html/storage"
    environment:
      CONTAINER_MODE: http
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY:-}
      APP_URL: ${APP_URL:-https://${APP_DOMAIN}}
      APP_FORCE_HTTPS: ${APP_FORCE_HTTPS:-true}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-0.0.0.0/0,2000:0:0:0:0:0:0:0/3}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-database}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-solidtime}
      DB_USERNAME: ${DB_USERNAME:-solidtime}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr_daily}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      PUBLIC_FILESYSTEM_DISK: ${PUBLIC_FILESYSTEM_DISK:-public}
      GOTENBERG_URL: ${GOTENBERG_URL:-http://gotenberg:3000}
    env_file:
      - laravel.env
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8000/health-check/up" ]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      - database
      - init-permissions
  scheduler:
    restart: always
    image: "solidtime/solidtime:${SOLIDTIME_IMAGE_TAG:-latest}"
    user: "1000:1000"
    networks:
      - internal
    volumes:
      - "app-storage:/var/www/html/storage"
    environment:
      CONTAINER_MODE: scheduler
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-database}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-solidtime}
      DB_USERNAME: ${DB_USERNAME:-solidtime}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
    env_file:
      - laravel.env
    healthcheck:
      test: [ "CMD", "healthcheck" ]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      - database
      - init-permissions
  queue:
    restart: always
    image: "solidtime/solidtime:${SOLIDTIME_IMAGE_TAG:-latest}"
    user: "1000:1000"
    networks:
      - internal
    volumes:
      - "app-storage:/var/www/html/storage"
    environment:
      CONTAINER_MODE: worker
      WORKER_COMMAND: "php /var/www/html/artisan queue:work"
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-database}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-solidtime}
      DB_USERNAME: ${DB_USERNAME:-solidtime}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
    env_file:
      - laravel.env
    healthcheck:
      test: [ "CMD", "healthcheck" ]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      - database
      - init-permissions
  database:
    restart: always
    image: 'postgres:15'
#    ports:
#      - '${FORWARD_DB_PORT:-5432}:5432'
    environment:
      PGPASSWORD: '${DB_PASSWORD:-secret}'
      POSTGRES_DB: '${DB_DATABASE}'
      POSTGRES_USER: '${DB_USERNAME}'
      POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
    volumes:
      - 'database-storage:/var/lib/postgresql/data'
    networks:
      - internal
    healthcheck:
      test:
        - CMD
        - pg_isready
        - '-q'
        - '-d'
        - '${DB_DATABASE}'
        - '-U'
        - '${DB_USERNAME}'
      retries: 3
      timeout: 5s
  gotenberg:
    image: gotenberg/gotenberg:8
    networks:
      - internal
    depends_on:
      - init-permissions
    healthcheck:
      test: [ "CMD", "curl", "--silent", "--fail", "http://localhost:3000/health" ]
networks:
  frontend:
    name: ${REVERSE_PROXY_NETWORK}
    external: true
  internal:
volumes:
  database-storage:
  app-storage:
