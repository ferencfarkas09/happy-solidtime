services:
  init-permissions:
    image: alpine:latest
    restart: "no"
    volumes:
      - "app-storage:/var/www/html/storage"
    command: >
      sh -c "mkdir -p /var/www/html/storage/logs /var/www/html/storage/app &&
             chown -R 1000:1000 /var/www/html/storage &&
             chmod -R ug+rwX /var/www/html/storage"
    networks:
      - internal

  # One-shot migration + seeding. Runs to completion then exits.
  # app/scheduler/queue wait for this service to finish successfully.
