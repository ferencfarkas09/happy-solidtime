      DB_HOST: "database"
      DB_PORT: "5432"
      DB_SSLMODE: "disable"
      DB_DATABASE: "${DB_DATABASE:-solidtime}"
      DB_USERNAME: "${DB_USERNAME:-solidtime}"
      DB_PASSWORD: "${DB_PASSWORD:-KcgplezS5MkmU/sugg7gMg==}"

      QUEUE_CONNECTION: "database"
      FILESYSTEM_DISK: "local"
      PUBLIC_FILESYSTEM_DISK: "public"
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        set -e
        echo "⏳ Waiting for database..."
        for i in $$(seq 1 60); do
          if php -r "try { new PDO('pgsql:host=database;port=5432;dbname='.getenv('DB_DATABASE'), getenv('DB_USERNAME'), getenv('DB_PASSWORD')); } catch (Throwable \$e) { exit(1); }" >/dev/null 2>&1; then
            echo "✅ Database reachable"; break
          fi
          sleep 2
        done

        # Detect whether this is a fresh database (no migrations table yet).
        # Laravel creates a "migrations" table on first `migrate`; we use its
        # presence to decide whether db:seed should run. On redeploys with an
        # existing volume, seeds are skipped so we don't duplicate data.
        IS_FRESH=$$(php -r "
          try {
            \$pdo = new PDO('pgsql:host=database;port=5432;dbname='.getenv('DB_DATABASE'), getenv('DB_USERNAME'), getenv('DB_PASSWORD'));
            \$stmt = \$pdo->query(\"SELECT to_regclass('public.migrations')\");
            \$row = \$stmt->fetch();
            echo (\$row[0] === null) ? 'yes' : 'no';
          } catch (Throwable \$e) { echo 'yes'; }
        ")
        echo "🔎 Fresh database: $$IS_FRESH"

        echo "📦 Running migrations (idempotent)..."
        php /var/www/html/artisan migrate --force --no-interaction

        if [ "$$IS_FRESH" = "yes" ]; then
          echo "🌱 First-time setup — seeding database..."
          php /var/www/html/artisan db:seed --force --no-interaction || true
          echo "🔑 Creating personal-access Passport client..."
          php /var/www/html/artisan passport:client --personal --no-interaction --name="solidtime" || true
        else
          echo "♻️  Existing database detected — skipping seeds (data preserved)."
        fi

        echo "✨ Migrate step complete."
    depends_on:
      database:
        condition: service_healthy
      init-permissions:
        condition: service_completed_successfully

  app:
